<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Cup Match Tracker</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">FIFA World Cup 2026</p>
          <h1>Match Tracker</h1>
          <p class="subtitle">Browse seeded match results, filter by team or stage, and inspect the latest fixtures.</p>
        </div>
      </header>

      <section class="controls" aria-label="Match filters">
        <label class="field">
          <span>Team</span>
          <input id="teamFilter" type="text" placeholder="Search team name" />
        </label>

        <label class="field">
          <span>Date</span>
          <input id="dateFilter" type="date" />
        </label>

        <label class="field">
          <span>Stage</span>
          <select id="stageFilter">
            <option value="">All stages</option>
            <option value="group">Group</option>
            <option value="round of 16">Round of 16</option>
            <option value="quarter-final">Quarter-final</option>
            <option value="semi-final">Semi-final</option>
            <option value="final">Final</option>
          </select>
        </label>

        <button id="refreshButton" type="button">Refresh</button>
      </section>

      <section class="create-card" aria-label="Create match form">
        <h2>Add a match</h2>
        <form id="createMatchForm" class="create-form">
          <div class="form-grid">
            <label class="field">
              <span>Home team</span>
              <input id="homeTeam" name="homeTeam" type="text" required />
            </label>

            <label class="field">
              <span>Away team</span>
              <input id="awayTeam" name="awayTeam" type="text" required />
            </label>

            <label class="field">
              <span>Home score</span>
              <input id="homeScore" name="homeScore" type="number" min="0" required />
            </label>

            <label class="field">
              <span>Away score</span>
              <input id="awayScore" name="awayScore" type="number" min="0" required />
            </label>

            <label class="field">
              <span>Date</span>
              <input id="matchDate" name="matchDate" type="date" required />
            </label>

            <label class="field">
              <span>Location</span>
              <input id="location" name="location" type="text" required />
            </label>

            <label class="field">
              <span>Stage</span>
              <select id="createStage" name="stage" required>
                <option value="">Select stage</option>
                <option value="group">Group</option>
                <option value="round of 16">Round of 16</option>
                <option value="quarter-final">Quarter-final</option>
                <option value="semi-final">Semi-final</option>
                <option value="final">Final</option>
              </select>
            </label>
          </div>

          <div class="form-actions">
            <button id="createMatchButton" type="submit">Create match</button>
          </div>
        </form>
      </section>

      <p id="status" class="status" role="status">Loading matches…</p>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Home</th>
              <th>Away</th>
              <th>Score</th>
              <th>Date</th>
              <th>Location</th>
              <th>Stage</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="matchesTableBody"></tbody>
        </table>
      </div>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
